<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Crawler Home</title>
    <link rel="stylesheet" href="/webserver/style.css">
</head>
<body>

    <main class="container">
        <header>
            <h1>Mijn Game Jam Project</h1>
            <p class="subtitle">Een korte, unieke speelervaring gemaakt voor de jam.</p>
        </header>

        <section class="cta-section">
            <a href="/casino-crawler" class="play-button">Speel de Game</a>
        </section>

        <section class="tutorial">
            <h2>Hoe speel je het?</h2>
            <ul>
                <li><strong>W, A, S, D</strong> of pijltoetsen om te bewegen.</li>
                <li><strong>Spatiebalk</strong> om te springen of acties uit te voeren.</li>
                <li><strong>Doel:</strong> Overleef zo lang mogelijk en haal de highscore!</li>
            </ul>
        </section>
    </main>

</body>
